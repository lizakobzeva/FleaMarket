# docker-compose.yml
# Версия формата Compose
version: '3.8'

# Секция services описывает все контейнеры
services:
  # --- Auth Service ---
  auth-service:
    # Сборка из Dockerfile в папке ./auth-service
    build: ./auth-service
    # Проброс портов: порт хоста 8001 -> порт контейнера 8000
    ports:
      - "8001:8000"
    # Монтируем код для разработки
    volumes:
      - ./auth-service:/app
    # Переменные окружения (для будущего подключения БД)
    environment:
      - DATABASE_URL=postgresql://postgres:password@auth-db:5432/authdb
    # Зависимости: сначала запускается БД
    depends_on:
      - auth-db
    # Имя сети (все сервисы в одной сети видят друг друга)
    networks:
      - backend

  # База данных для Auth-сервиса
  auth-db:
    image: postgres:15
    environment:
      - POSTGRES_DB=authdb
      - POSTGRES_PASSWORD=password
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - backend

  # --- Core Service ---
  core-service:
    build: ./core-service
    ports:
      - "8002:8000"
    volumes:
      - ./core-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@core-db:5432/coredb
      # ВАЖНО: URL Auth-сервиса для вызовов из Core
      # Внутри сети Docker имя auth-service преобразуется в IP
      - AUTH_SERVICE_URL=http://auth-service:8000
      # URL Notification-сервиса
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
    depends_on:
      - core-db
      - auth-service  # Core зависит от Auth
    networks:
      - backend

  core-db:
    image: postgres:15
    environment:
      - POSTGRES_DB=coredb
      - POSTGRES_PASSWORD=password
    volumes:
      - core-db-data:/var/lib/postgresql/data
    networks:
      - backend

  # --- Notification Service ---
  notification-service:
    build: ./notification-service
    ports:
      - "8003:8000"
    volumes:
      - ./notification-service:/app
    networks:
      - backend

# Определяем сети
networks:
  backend:
    driver: bridge

# Определяем volumes для сохранения данных БД
volumes:
  auth-db-data:

  core-db-data:
