[mypy]
python_version = 3.11
ignore_missing_imports = True
show_error_codes = True
warn_unused_ignores = False
explicit_package_bases = True
no_implicit_optional = False
warn_return_any = False
# Учебный проект: ORM/Column-типы без полной аннотации — не блокируем CI десятками ложных ошибок.
disable_error_code = assignment, arg-type, call-overload, misc, operator, valid-type, type-var, union-attr, index, attr-defined

[mypy-app.router]
# SQLAlchemy 2 + ColumnCollection в select(): остаётся шум даже с disable_error_code
ignore_errors = True
