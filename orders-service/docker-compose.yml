version: "3.8"

services:
  db:
    image: postgres:15
    container_name: orders-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    networks:
      - microservices-net

  orders-service:
    build: .
    container_name: orders-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - auth-service
      - notification-service
    networks:
      - microservices-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8002:8000"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
