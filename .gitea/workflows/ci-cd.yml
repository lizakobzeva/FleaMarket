# CI/CD: тесты всех микросервисов → сборка 5 образов → push в git.klsh.ru
# Запуск: Gitea → Actions → CI/CD Pipeline → Run workflow

name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            database_url: sqlite+aiosqlite:///./auth_ci.db
          - service: products-service
            database_url: sqlite+aiosqlite:///:memory:
          - service: chat-service
            database_url: sqlite:///./chat_ci.db
          - service: orders-service
            database_url: sqlite:///./orders_ci.db
          - service: rating-service
            database_url: sqlite:///./rating_ci.db

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          SECRET_KEY: ci-secret-key-for-testing-only
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pytest tests/ -q

  build-and-push:
    name: build (${{ matrix.service }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - products-service
          - chat-service
          - orders-service
          - rating-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute registry prefix
        id: registry
        run: |
          OWNER=$(echo "${{ gitea.repository }}" | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ gitea.repository }}" | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          echo "prefix=git.klsh.ru/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Log in to container registry
        run: |
          echo "${{ secrets.RUNNER_TOKEN }}" | docker login git.klsh.ru \
            -u "${{ gitea.actor }}" --password-stdin

      - name: Build and push Docker image
        env:
          REGISTRY_PREFIX: ${{ steps.registry.outputs.prefix }}
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE="${REGISTRY_PREFIX}-${SERVICE}"
          docker build -f "${SERVICE}/Dockerfile.prod" -t "${IMAGE}:latest" -t "${IMAGE}:${{ gitea.sha }}" "${SERVICE}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ gitea.sha }}"
          echo "Pushed ${IMAGE}:latest"

  summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: echo "All images built. Run Deploy Check workflow next."
