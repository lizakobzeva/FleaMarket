# Секция services описывает все контейнеры
services:
  # --- Auth Service (моковый сервис) ---
  mock-auth-service:
    # Сборка из Dockerfile в папке ./auth-service
    build: ./mock-auth-service
    # Проброс портов: порт хоста 8001 -> порт контейнера 8000
    ports:
      - "8001:8000"
    # Монтируем код для разработки
    volumes:
      - ./mock-auth-service:/app
    # Переменные окружения (для будущего подключения БД)
    env_file: .env
    # Зависимости: сначала запускается БД
    depends_on:
      postgres:
        condition: service_healthy
    # Имя сети (все сервисы в одной сети видят друг друга)
    networks:
      - backend
    restart: always

  # --- Products Service ---
  products-service:
    build: ./products-service
    ports:
      - "8002:8000"
    volumes:
      - ./products-service:/app
    env_file:
      .env
    environment:
      # ВАЖНО: URL Auth-сервиса для вызовов из Product
      # Внутри сети Docker имя auth-service преобразуется в IP
      - AUTH_SERVICE_URL=http://mock-auth-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      mock-auth-service:
        condition: service_started # Products зависит от Auth
    networks:
      - backend
    restart: always

  postgres:
    image: 'postgres:16.2'
    ports:
      - "54320:5432"
    env_file: .env
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 1s
      timeout: 1s
      retries: 60
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

# Определяем сети
networks:
  backend:
    driver: bridge

# Определяем volumes для сохранения данных БД
volumes:
  postgres-data:
